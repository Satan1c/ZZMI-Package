namespace = Healthbar

[Constants]
global $enable_shields = 1

global $active = 0

global $icon_counter = 0
global $store_temp = -1

global $hp_main = -1
global $hp_2 = -1
global $hp_3 = -1

global $next_update = 0
global $update_request = 0

[Present]
post $icon_counter = 0
if $active
	post $active = $active - 1
endif
if $update_request
	post $update_request = $update_request - 1
endif

[CommandListRequestUpdate]
$update_request = 3


[ShaderOverride UI Icons PS]
hash = 857cd16250c6142e
allow_duplicate_hash = true
filter_index = 857.625
[ShaderOverride UI Icons VS]
hash = cdc90aee00e7900d
allow_duplicate_hash = true
if $update_request && $active && ps == 857.625
	if ps-t0 == 180.64
		if $icon_counter < 3
			if $icon_counter == 0
				if $hp_main != -1
					$\Healthbar\value = $hp_main
				endif
			elif $icon_counter == 1
				if $hp_2 != -1
					$\Healthbar\value = $hp_2
				endif
			elif $icon_counter == 2
				if $hp_3 != -1
					$\Healthbar\value = $hp_3
				endif
			endif
			if $\ZZMIv1\check_textures != 2
				CheckTextureOverride = ps-t0
			endif
		endif
		$icon_counter = $icon_counter + 1
	endif
endif

[TextureOverridezzz Icons]
match_type = Texture2D
match_format = BC3_UNORM_SRGB
match_width = 180
match_height = 64
match_mips = 1
match_index_count = 6
match_priority = 999
filter_index = 180.64


[ShaderOverridezzz UI Hp bar VS]
hash = 0086a8159f4d9a00
allow_duplicate_hash = true
filter_index = 8681.5949
[ShaderOverride UI Hp bar PS]
hash = dce9c76d7f184caf
if $update_request && $costume_mods && vs == 8681.5949
	local $t0 = ps-t0
	if $t0 == 1024.54 || $t0 == 1024.6
		$active = 3
		if ($hp_main != -1 && $hp_2 != -1 && $hp_3 != -1) && (time > $next_update)
			$hp_main = -1
			$hp_2 = -1
			$hp_3 = -1

			$next_update = time + 0.3
		endif

		if $hp_main == -1
			store = $store_temp, ref ps-cb0, 45
			$hp_main = $store_temp
			if $enable_shields
				store = $store_temp, ref ps-cb0, 46
				$hp_main = $hp_main + $store_temp
			endif
		elif $hp_2 == -1
			store = $store_temp, ref ps-cb0, 45
			$hp_2 = $store_temp
			if $enable_shields
				store = $store_temp, ref ps-cb0, 46
				$hp_2 = $hp_2 + $store_temp
			endif
		elif $hp_3 == -1
			store = $store_temp, ref ps-cb0, 45
			$hp_3 = $store_temp
			if $enable_shields
				store = $store_temp, ref ps-cb0, 46
				$hp_3 = $hp_3 + $store_temp
			endif
		endif
	endif
endif

[TextureOverride HealthBar current]
match_type = Texture2D
match_format = BC3_UNORM_SRGB
match_width = 1024
match_height = 1024
match_mips = 1
match_index_count = 54
match_priority = 999
filter_index = 1024.54

[TextureOverride HealthBar team]
match_type = Texture2D
match_format = BC3_UNORM_SRGB
match_width = 1024
match_height = 1024
match_mips = 1
match_index_count = 6
match_first_index = >600
match_priority = 999
filter_index = 1024.6
